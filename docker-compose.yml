# Local dev. Production deploys only the `api` service — it's fully
# self-contained (model baked in). The `mlflow` service here is for
# browsing experiments/runs in the UI, not a runtime dependency.
#
# Build:   uv run python -m src.bundle && docker compose up --build

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    init: true  # clean signal handling for the two-child start.sh
    ports:
      - "8000:8000"    # FastAPI
      - "8501:8501"    # Streamlit dashboard
    volumes:
      # features CSV cache for the live fallback path in /predict.
      # Phase 5's refresh cron writes data/cache/predictions.json,
      # which the api container reads via the mounted data/ dir.
      - ./data:/app/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow.db
      --default-artifact-root /mlruns
    environment:
      # `*` is fine for local dev — production deployments should restrict.
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
    ports:
      # Host 5001 — macOS claims 5000 for AirPlay Receiver.
      - "5001:5000"
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow.db:/mlflow.db
