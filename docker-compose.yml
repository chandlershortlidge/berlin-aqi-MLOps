# Local dev: API container + MLflow UI container share an mlruns volume.
# Run: docker compose up --build

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --default-artifact-root /mlruns
    ports:
      - "5000:5000"
    volumes:
      # Mount the host mlruns/ so the API container reads the same runs
      # we've logged during local training. In prod this is an S3 bucket.
      - ./mlruns:/mlruns
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/health\")'"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      # Give the API container read access to the features CSVs that
      # src.features generates. Phase 5 will replace this with a live
      # cache or S3 object.
      - ./data:/app/data:ro
      - ./mlruns:/mlruns:ro
    depends_on:
      mlflow:
        condition: service_healthy
